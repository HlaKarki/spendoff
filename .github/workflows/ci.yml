name: CI

on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same branch makes the in-flight run irrelevant.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · format · test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Same command the deploy gate runs locally (package.json `check`), so CI and `bun run deploy`
      # can never disagree about what "passing" means.
      - name: Check
        run: bun run check
